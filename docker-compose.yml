version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: summit
      POSTGRES_USER: summit
      POSTGRES_PASSWORD: summit_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./summit-api/internal/database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U summit"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./summit-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://summit:summit_dev@db:5432/summit?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./summit-web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
